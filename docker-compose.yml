services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=support_ai
      - POSTGRES_PASSWORD=support_ai
      - POSTGRES_DB=support_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_ai -d support_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv # preserve container's virtual environment
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://support_ai:support_ai@postgres:5432/support_ai
    depends_on:
      postgres:
        condition: service_healthy
      telemetry:
        condition: service_started
      billing:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # preserve container's node_modules
      - /app/.next # preserve container's build cache
    environment:
      - WATCHPACK_POLLING=true # required for Windows file-watching in Docker
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  telemetry:
    build: ./mcp-servers/telemetry
    ports:
      - "8001:8001"
    environment:
      - MCP_TRANSPORT=sse
      - PORT=8001
    restart: unless-stopped

  billing:
    build: ./mcp-servers/billing
    ports:
      - "8002:8002"
    environment:
      - MCP_TRANSPORT=sse
      - PORT=8002
    restart: unless-stopped

volumes:
  postgres_data:
