services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv # preserve container's virtual environment
    environment:
      - DEBUG=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # preserve container's node_modules
      - /app/.next # preserve container's build cache
    environment:
      - WATCHPACK_POLLING=true # required for Windows file-watching in Docker
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
